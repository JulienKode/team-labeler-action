name: "test"
on:
  pull_request:
  issues:
  push:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - run: |
          pnpm install
          pnpm build:pack
      - uses: ./
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
